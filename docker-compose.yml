services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: resume_screening
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d resume_screening"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Python AI Service ───────────────────────────────────────────────────────
  ai-service:
    build: ./ai-service
    ports:
      - "8000:8000"
    volumes:
      - resume_uploads:/resumes
    environment:
      UPLOAD_DIR: /resumes
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Spring Boot Backend ─────────────────────────────────────────────────────
  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      DB_HOST: postgres
      DB_USER: postgres
      DB_PASS: postgres
      AI_SERVICE_URL: http://ai-service:8000
      UPLOAD_DIR: /resumes
      JWT_SECRET: change-me-in-production-super-secret-key-min-32-chars
    volumes:
      - resume_uploads:/resumes
    depends_on:
      postgres:
        condition: service_healthy
      ai-service:
        condition: service_healthy

  # ── Frontend (Nginx) ────────────────────────────────────────────────────────
  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend

volumes:
  pg_data:
  resume_uploads:
