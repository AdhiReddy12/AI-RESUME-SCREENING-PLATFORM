# ── Server ──────────────────────────────────────────────────────────────────
server.port=8080

# ── DataSource ───────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:5432/${DB_NAME:resume_screening}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASS:postgres}
spring.datasource.driverClassName=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.defer-datasource-initialization=true


# ── File Upload ──────────────────────────────────────────────────────────────
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=200MB
app.upload.dir=${UPLOAD_DIR:/tmp/resumes}

# ── AI Service ───────────────────────────────────────────────────────────────
app.ai-service.url=${AI_SERVICE_URL:http://localhost:8000}

# ── JWT ──────────────────────────────────────────────────────────────────────
app.jwt.secret=${JWT_SECRET:change-me-in-production-super-secret-key-at-least-32-chars}
app.jwt.expiration-ms=86400000

# ── Springdoc ────────────────────────────────────────────────────────────────
springdoc.api-docs.path=/api/api-docs
springdoc.swagger-ui.path=/api/swagger-ui.html
