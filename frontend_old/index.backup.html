<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ResumeAI · Smart Screening Platform</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink:      #0d0d0d;
      --paper:    #f5f3ee;
      --cream:    #ede9e0;
      --accent:   #d4562a;
      --accent2:  #2a6dd4;
      --success:  #2ab87a;
      --warn:     #e8a020;
      --muted:    #8a8680;
      --border:   #d8d4cb;
      --card:     #ffffff;
      --sidebar-w: 240px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--paper);
      color: var(--ink);
      min-height: 100vh;
    }

    /* ── Auth ─────────────────────────────────── */
    .auth-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--ink);
      position: relative;
      overflow: hidden;
    }
    .auth-wrap::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 60% at 80% 20%, rgba(212,86,42,.25) 0%, transparent 60%),
        radial-gradient(ellipse 50% 50% at 20% 80%, rgba(42,109,212,.2) 0%, transparent 60%);
    }
    .auth-card {
      background: var(--paper);
      border-radius: 2px;
      padding: 48px 52px;
      width: 420px;
      position: relative;
      z-index: 1;
    }
    .auth-logo {
      font-family: 'Syne', sans-serif;
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -1px;
      margin-bottom: 6px;
    }
    .auth-logo span { color: var(--accent); }
    .auth-sub { color: var(--muted); font-size: 13px; margin-bottom: 36px; }
    .field-label { font-size: 11px; font-weight: 500; letter-spacing: .08em; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
    .field-input {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid var(--border);
      background: var(--card);
      border-radius: 2px;
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      color: var(--ink);
      margin-bottom: 18px;
      outline: none;
      transition: border-color .15s;
    }
    .field-input:focus { border-color: var(--accent); }
    .btn-primary {
      width: 100%;
      padding: 13px;
      background: var(--ink);
      color: var(--paper);
      border: none;
      border-radius: 2px;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 14px;
      letter-spacing: .04em;
      cursor: pointer;
      transition: background .15s;
    }
    .btn-primary:hover { background: var(--accent); }
    .btn-primary:disabled { opacity: .5; cursor: default; }
    .error-msg { color: var(--accent); font-size: 12px; margin-bottom: 14px; }
    .hint-text { margin-top: 16px; color: var(--muted); font-size: 12px; text-align: center; }

    /* ── Layout ───────────────────────────────── */
    .app-shell { display: flex; min-height: 100vh; }

    .sidebar {
      width: var(--sidebar-w);
      background: var(--ink);
      color: var(--paper);
      display: flex;
      flex-direction: column;
      position: fixed;
      top: 0; left: 0; bottom: 0;
      z-index: 100;
    }
    .sidebar-logo {
      padding: 28px 24px 20px;
      font-family: 'Syne', sans-serif;
      font-size: 20px;
      font-weight: 800;
      border-bottom: 1px solid rgba(255,255,255,.08);
    }
    .sidebar-logo span { color: var(--accent); }
    .sidebar-nav { flex: 1; padding: 16px 0; }
    .nav-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 11px 24px;
      font-size: 13.5px;
      font-weight: 500;
      color: rgba(255,255,255,.5);
      cursor: pointer;
      transition: all .15s;
      border-left: 2px solid transparent;
    }
    .nav-item:hover { color: var(--paper); background: rgba(255,255,255,.04); }
    .nav-item.active { color: var(--paper); border-left-color: var(--accent); background: rgba(212,86,42,.08); }
    .nav-icon { width: 16px; text-align: center; }
    .sidebar-user {
      padding: 16px 24px;
      border-top: 1px solid rgba(255,255,255,.08);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .user-avatar {
      width: 32px; height: 32px;
      background: var(--accent);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Syne', sans-serif;
      font-size: 13px;
      font-weight: 700;
    }
    .user-info { flex: 1; min-width: 0; }
    .user-name { font-size: 12.5px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .user-role { font-size: 10.5px; color: rgba(255,255,255,.4); text-transform: uppercase; letter-spacing: .06em; }
    .logout-btn { color: rgba(255,255,255,.3); cursor: pointer; font-size: 12px; transition: color .15s; }
    .logout-btn:hover { color: var(--accent); }

    .main-content {
      margin-left: var(--sidebar-w);
      flex: 1;
      padding: 40px 44px;
      max-width: calc(100vw - var(--sidebar-w));
    }

    .page-header {
      margin-bottom: 36px;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
    }
    .page-title {
      font-family: 'Syne', sans-serif;
      font-size: 32px;
      font-weight: 800;
      letter-spacing: -1px;
    }
    .page-sub { color: var(--muted); font-size: 13px; margin-top: 4px; }

    /* ── Cards ────────────────────────────────── */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 24px;
    }
    .stat-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 16px; margin-bottom: 32px; }
    .stat-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 22px 24px;
    }
    .stat-label { font-size: 10.5px; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin-bottom: 8px; }
    .stat-value { font-family: 'Syne', sans-serif; font-size: 36px; font-weight: 800; letter-spacing: -1px; }
    .stat-chip {
      display: inline-block;
      font-size: 10px;
      padding: 2px 7px;
      border-radius: 20px;
      margin-top: 6px;
      font-weight: 500;
    }
    .chip-green { background: rgba(42,184,122,.12); color: var(--success); }
    .chip-orange { background: rgba(212,86,42,.12); color: var(--accent); }
    .chip-blue { background: rgba(42,109,212,.12); color: var(--accent2); }

    /* ── Table ────────────────────────────────── */
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 13.5px; }
    thead th {
      text-align: left;
      padding: 10px 16px;
      font-size: 10.5px;
      text-transform: uppercase;
      letter-spacing: .07em;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
    }
    tbody tr { border-bottom: 1px solid var(--border); transition: background .12s; }
    tbody tr:hover { background: var(--cream); }
    tbody td { padding: 13px 16px; vertical-align: middle; }

    .score-bar-wrap { display: flex; align-items: center; gap: 8px; }
    .score-bar-bg { flex: 1; height: 4px; background: var(--cream); border-radius: 2px; overflow: hidden; }
    .score-bar-fill { height: 100%; border-radius: 2px; transition: width .4s; }
    .score-text { font-family: 'DM Mono', monospace; font-size: 12px; width: 34px; text-align: right; }

    /* ── Status badges ────────────────────────── */
    .badge {
      display: inline-block;
      padding: 2px 9px;
      border-radius: 20px;
      font-size: 10.5px;
      font-weight: 600;
      letter-spacing: .04em;
      text-transform: uppercase;
    }
    .badge-SCREENED    { background:#e8e4dc; color:#5a5650; }
    .badge-SHORTLISTED { background:rgba(42,184,122,.12); color:var(--success); }
    .badge-INTERVIEWED { background:rgba(42,109,212,.12); color:var(--accent2); }
    .badge-OFFERED     { background:rgba(232,160,32,.12); color:var(--warn); }
    .badge-HIRED       { background:rgba(42,184,122,.2); color:#1a8f5e; }
    .badge-REJECTED    { background:rgba(212,86,42,.12); color:var(--accent); }
    .badge-OPEN        { background:rgba(42,184,122,.12); color:var(--success); }
    .badge-CLOSED      { background:rgba(212,86,42,.12); color:var(--accent); }
    .badge-DRAFT       { background:#e8e4dc; color:#5a5650; }

    /* ── Buttons ──────────────────────────────── */
    .btn {
      padding: 8px 18px;
      border-radius: 2px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all .15s;
      font-family: 'DM Sans', sans-serif;
    }
    .btn-dark { background: var(--ink); color: var(--paper); }
    .btn-dark:hover { background: var(--accent); }
    .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--ink); }
    .btn-outline:hover { border-color: var(--ink); }
    .btn-sm { padding: 5px 12px; font-size: 11.5px; }
    .btn-danger { background: var(--accent); color: white; }
    .btn-danger:hover { opacity: .85; }

    /* ── Form ─────────────────────────────────── */
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .form-field { display: flex; flex-direction: column; gap: 6px; }
    .form-field.full { grid-column: 1 / -1; }
    .form-label { font-size: 11px; text-transform: uppercase; letter-spacing: .07em; color: var(--muted); }
    .form-input {
      padding: 9px 12px;
      border: 1px solid var(--border);
      border-radius: 2px;
      font-size: 13.5px;
      font-family: 'DM Sans', sans-serif;
      color: var(--ink);
      background: var(--paper);
      outline: none;
      transition: border-color .15s;
    }
    .form-input:focus { border-color: var(--ink); }
    textarea.form-input { resize: vertical; min-height: 80px; }
    select.form-input { appearance: none; cursor: pointer; }

    /* ── Modal ────────────────────────────────── */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.5);
      display: flex; align-items: center; justify-content: center;
      z-index: 1000;
    }
    .modal-box {
      background: var(--paper);
      border-radius: 2px;
      padding: 36px 40px;
      width: 560px;
      max-height: 90vh;
      overflow-y: auto;
    }
    .modal-title { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 800; margin-bottom: 28px; }
    .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 28px; }

    /* ── Upload zone ──────────────────────────── */
    .upload-zone {
      border: 2px dashed var(--border);
      border-radius: 2px;
      padding: 48px 24px;
      text-align: center;
      cursor: pointer;
      transition: all .2s;
    }
    .upload-zone:hover, .upload-zone.dragging { border-color: var(--accent); background: rgba(212,86,42,.03); }
    .upload-icon { font-size: 40px; margin-bottom: 12px; }
    .upload-label { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 700; margin-bottom: 6px; }
    .upload-sub { color: var(--muted); font-size: 13px; }
    .upload-input { display: none; }
    .file-list { margin-top: 20px; display: flex; flex-direction: column; gap: 8px; }
    .file-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 14px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 2px;
      font-size: 13px;
    }
    .file-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .file-size { color: var(--muted); font-family: 'DM Mono', monospace; font-size: 11px; }

    /* ── Chart container ─────────────────────── */
    .chart-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 28px; }
    .chart-box { background: var(--card); border: 1px solid var(--border); padding: 22px; border-radius: 2px; }
    .chart-title { font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700; margin-bottom: 16px; }

    /* ── Detail panel ─────────────────────────── */
    .detail-panel {
      position: fixed;
      top: 0; right: 0; bottom: 0;
      width: 460px;
      background: var(--paper);
      border-left: 1px solid var(--border);
      padding: 36px 32px;
      overflow-y: auto;
      z-index: 200;
      transform: translateX(100%);
      transition: transform .25s;
    }
    .detail-panel.open { transform: translateX(0); }
    .detail-close { cursor: pointer; font-size: 20px; float: right; color: var(--muted); }
    .detail-close:hover { color: var(--ink); }
    .detail-name { font-family: 'Syne', sans-serif; font-size: 24px; font-weight: 800; margin: 16px 0 4px; }
    .detail-email { color: var(--muted); font-size: 13px; margin-bottom: 20px; }
    .score-ring-row { display: flex; gap: 12px; margin-bottom: 24px; }
    .score-ring {
      flex: 1;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 14px 10px;
      text-align: center;
    }
    .score-ring-val { font-family: 'Syne', sans-serif; font-size: 24px; font-weight: 800; }
    .score-ring-lbl { font-size: 9.5px; text-transform: uppercase; letter-spacing: .07em; color: var(--muted); margin-top: 2px; }
    .detail-section { margin-bottom: 20px; }
    .detail-section-title { font-size: 10.5px; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin-bottom: 10px; }
    .skill-tag {
      display: inline-block;
      padding: 4px 10px;
      background: var(--cream);
      border-radius: 2px;
      font-size: 11.5px;
      margin: 3px;
      font-family: 'DM Mono', monospace;
    }
    .summary-text { font-size: 13.5px; line-height: 1.65; color: #444; }

    /* ── Toasts ───────────────────────────────── */
    .toast-wrap { position: fixed; bottom: 24px; right: 24px; display: flex; flex-direction: column; gap: 8px; z-index: 9999; }
    .toast {
      background: var(--ink);
      color: var(--paper);
      padding: 12px 18px;
      border-radius: 2px;
      font-size: 13px;
      min-width: 260px;
      animation: slideUp .2s ease;
    }
    .toast.success { border-left: 3px solid var(--success); }
    .toast.error   { border-left: 3px solid var(--accent); }
    @keyframes slideUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }

    /* ── Loading ──────────────────────────────── */
    .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid currentColor; border-top-color: transparent; border-radius: 50%; animation: spin .6s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-overlay { display: flex; align-items: center; justify-content: center; padding: 60px; }

    .empty-state { text-align: center; padding: 60px 20px; color: var(--muted); }
    .empty-icon { font-size: 48px; margin-bottom: 12px; }
    .empty-text { font-size: 15px; }

    .section-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; }
    .section-title { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 700; }

    .jobs-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; }
    .job-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 22px;
      cursor: pointer;
      transition: all .15s;
    }
    .job-card:hover { border-color: var(--ink); transform: translateY(-1px); }
    .job-card-title { font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 700; margin-bottom: 4px; }
    .job-card-dept { color: var(--muted); font-size: 12px; margin-bottom: 14px; }
    .job-card-meta { display: flex; gap: 10px; align-items: center; font-size: 12px; color: var(--muted); }

    .tag {
      display: inline-block;
      padding: 2px 8px;
      background: var(--cream);
      border-radius: 2px;
      font-size: 11px;
      font-family: 'DM Mono', monospace;
      margin: 2px;
    }

    .select-sm {
      padding: 5px 10px;
      border: 1px solid var(--border);
      border-radius: 2px;
      font-size: 12px;
      background: var(--paper);
      color: var(--ink);
      cursor: pointer;
    }
  </style>
</head>
<body>

<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ── API ──────────────────────────────────────────────────────────────────────
const API_BASE = 'http://localhost:8080/api';

const api = {
  token: null,
  setToken(t) { this.token = t; },
  headers() {
    const h = { 'Content-Type': 'application/json' };
    if (this.token) h['Authorization'] = `Bearer ${this.token}`;
    return h;
  },
  async get(path) {
    const r = await fetch(API_BASE + path, { headers: this.headers() });
    if (!r.ok) throw new Error(await r.text());
    return r.json();
  },
  async post(path, body) {
    const r = await fetch(API_BASE + path, { method: 'POST', headers: this.headers(), body: JSON.stringify(body) });
    if (!r.ok) throw new Error(await r.text());
    return r.json();
  },
  async put(path, body) {
    const r = await fetch(API_BASE + path, { method: 'PUT', headers: this.headers(), body: JSON.stringify(body) });
    if (!r.ok) throw new Error(await r.text());
    return r.json();
  },
  async patch(path, body) {
    const r = await fetch(API_BASE + path, { method: 'PATCH', headers: this.headers(), body: JSON.stringify(body) });
    if (!r.ok) throw new Error(await r.text());
    return r.json();
  },
  async del(path) {
    const r = await fetch(API_BASE + path, { method: 'DELETE', headers: this.headers() });
    if (!r.ok) throw new Error(await r.text());
    return r.ok;
  },
  async upload(path, formData) {
    const h = {};
    if (this.token) h['Authorization'] = `Bearer ${this.token}`;
    const r = await fetch(API_BASE + path, { method: 'POST', headers: h, body: formData });
    if (!r.ok) throw new Error(await r.text());
    return r.json();
  }
};

// ── Toast ─────────────────────────────────────────────────────────────────────
let toastFn = null;
function Toast() {
  const [toasts, setToasts] = useState([]);
  useEffect(() => {
    toastFn = (msg, type='success') => {
      const id = Date.now();
      setToasts(p => [...p, {id, msg, type}]);
      setTimeout(() => setToasts(p => p.filter(t => t.id !== id)), 3500);
    };
  }, []);
  return (
    <div className="toast-wrap">
      {toasts.map(t => <div key={t.id} className={`toast ${t.type}`}>{t.msg}</div>)}
    </div>
  );
}
const toast = (msg, type) => toastFn && toastFn(msg, type);

// ── ScoreBar ──────────────────────────────────────────────────────────────────
function ScoreBar({ value = 0 }) {
  const color = value >= 70 ? '#2ab87a' : value >= 50 ? '#e8a020' : '#d4562a';
  return (
    <div className="score-bar-wrap">
      <div className="score-bar-bg">
        <div className="score-bar-fill" style={{ width: `${value}%`, background: color }} />
      </div>
      <span className="score-text">{Math.round(value)}</span>
    </div>
  );
}

// ── AuthPage ──────────────────────────────────────────────────────────────────
function AuthPage({ onLogin }) {
  const [email, setEmail] = useState('hr@resumeai.com');
  const [password, setPassword] = useState('password');
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');

  const submit = async () => {
    setLoading(true); setError('');
    try {
      const res = await fetch(`${API_BASE}/auth/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      if (!res.ok) { setError('Invalid credentials'); return; }
      const data = await res.json();
      onLogin(data);
    } catch (e) {
      setError('Cannot connect to server. Make sure the backend is running.');
    } finally {
      setLoading(false);
    }
  };

  return (
    <div className="auth-wrap">
      <div className="auth-card">
        <div className="auth-logo">Resume<span>AI</span></div>
        <p className="auth-sub">Smart Screening Platform · Sign in to continue</p>
        {error && <p className="error-msg">⚠ {error}</p>}
        <div className="field-label">Email</div>
        <input className="field-input" value={email} onChange={e=>setEmail(e.target.value)}
               onKeyDown={e=>e.key==='Enter'&&submit()} />
        <div className="field-label">Password</div>
        <input className="field-input" type="password" value={password}
               onChange={e=>setPassword(e.target.value)} onKeyDown={e=>e.key==='Enter'&&submit()} />
        <button className="btn-primary" onClick={submit} disabled={loading}>
          {loading ? <span className="spinner" /> : 'Sign In'}
        </button>
        <p className="hint-text">Default: hr@resumeai.com / password</p>
      </div>
      <Toast />
    </div>
  );
}

// ── Dashboard ─────────────────────────────────────────────────────────────────
function Dashboard() {
  const [stats, setStats] = useState(null);
  const doughnutRef = useRef(); const barRef = useRef();
  const chartInstances = useRef({});

  useEffect(() => {
    api.get('/resumes/stats').then(setStats).catch(() => {
      // mock stats if backend not running
      setStats({ total: 142, shortlisted: 48, hired: 12, rejected: 31 });
    });
  }, []);

  useEffect(() => {
    if (!stats) return;

    // Doughnut
    if (chartInstances.current.doughnut) chartInstances.current.doughnut.destroy();
    if (doughnutRef.current) {
      chartInstances.current.doughnut = new Chart(doughnutRef.current, {
        type: 'doughnut',
        data: {
          labels: ['Shortlisted','Hired','Rejected','Screened'],
          datasets: [{ data: [stats.shortlisted, stats.hired, stats.rejected,
                              Math.max(0, stats.total - stats.shortlisted - stats.hired - stats.rejected)],
                       backgroundColor: ['#2ab87a','#2a6dd4','#d4562a','#d8d4cb'],
                       borderWidth: 0 }]
        },
        options: { cutout: '68%', plugins: { legend: { position: 'right', labels: { font: { family: 'DM Sans', size: 12 }, boxWidth: 10 } } } }
      });
    }

    // Bar
    if (chartInstances.current.bar) chartInstances.current.bar.destroy();
    if (barRef.current) {
      chartInstances.current.bar = new Chart(barRef.current, {
        type: 'bar',
        data: {
          labels: ['< 40', '40–59', '60–74', '75–89', '90+'],
          datasets: [{
            label: 'Candidates',
            data: [8, 19, 35, 47, 33],
            backgroundColor: '#0d0d0d',
            borderRadius: 2,
          }]
        },
        options: {
          plugins: { legend: { display: false } },
          scales: {
            x: { grid: { display: false } },
            y: { grid: { color: '#f0ece4' }, beginAtZero: true }
          }
        }
      });
    }
  }, [stats]);

  if (!stats) return <div className="loading-overlay"><span className="spinner" /></div>;

  return (
    <div>
      <div className="page-header">
        <div>
          <div className="page-title">Dashboard</div>
          <div className="page-sub">Overview of your recruitment pipeline</div>
        </div>
      </div>

      <div className="stat-grid">
        {[
          { label: 'Total Screened', value: stats.total, chip: 'All time', chipClass: 'chip-blue' },
          { label: 'Shortlisted', value: stats.shortlisted, chip: `${Math.round(stats.shortlisted/stats.total*100)||0}% rate`, chipClass: 'chip-green' },
          { label: 'Hired', value: stats.hired, chip: 'Confirmed', chipClass: 'chip-green' },
          { label: 'Rejected', value: stats.rejected, chip: 'Below threshold', chipClass: 'chip-orange' },
        ].map(s => (
          <div key={s.label} className="stat-card">
            <div className="stat-label">{s.label}</div>
            <div className="stat-value">{s.value}</div>
            <span className={`stat-chip ${s.chipClass}`}>{s.chip}</span>
          </div>
        ))}
      </div>

      <div className="chart-grid">
        <div className="chart-box">
          <div className="chart-title">Pipeline Breakdown</div>
          <canvas ref={doughnutRef} height="160" />
        </div>
        <div className="chart-box">
          <div className="chart-title">Score Distribution</div>
          <canvas ref={barRef} height="160" />
        </div>
      </div>
    </div>
  );
}

// ── Jobs ──────────────────────────────────────────────────────────────────────
function Jobs({ onSelectJob }) {
  const [jobs, setJobs] = useState([]);
  const [loading, setLoading] = useState(true);
  const [showModal, setShowModal] = useState(false);
  const [editJob, setEditJob] = useState(null);
  const blank = { title:'', department:'', description:'', requiredSkills:'', preferredSkills:'', minExperience:0, educationLevel:'BACHELORS', keywords:'', shortlistThreshold:70, status:'OPEN' };
  const [form, setForm] = useState(blank);

  const load = () => {
    setLoading(true);
    api.get('/jobs').then(data => { setJobs(data); setLoading(false); }).catch(() => setLoading(false));
  };
  useEffect(load, []);

  const openCreate = () => { setForm(blank); setEditJob(null); setShowModal(true); };
  const openEdit   = (j) => {
    setForm({ title: j.title, department: j.department||'', description: j.description||'',
              requiredSkills: j.requiredSkills||'', preferredSkills: j.preferredSkills||'',
              minExperience: j.minExperience||0, educationLevel: j.educationLevel||'BACHELORS',
              keywords: j.keywords||'', shortlistThreshold: j.shortlistThreshold||70,
              status: j.status });
    setEditJob(j);
    setShowModal(true);
  };

  const save = async () => {
    try {
      if (editJob) { await api.put(`/jobs/${editJob.id}`, form); toast('Job updated'); }
      else         { await api.post('/jobs', form);              toast('Job created'); }
      setShowModal(false); load();
    } catch(e) { toast(e.message, 'error'); }
  };

  const del = async (j) => {
    if (!confirm(`Delete "${j.title}"?`)) return;
    try { await api.del(`/jobs/${j.id}`); toast('Job deleted'); load(); }
    catch(e) { toast(e.message, 'error'); }
  };

  return (
    <div>
      <div className="page-header">
        <div>
          <div className="page-title">Job Listings</div>
          <div className="page-sub">{jobs.length} active positions</div>
        </div>
        <button className="btn btn-dark" onClick={openCreate}>+ New Job</button>
      </div>

      {loading ? <div className="loading-overlay"><span className="spinner" /></div> :
       jobs.length === 0 ? <div className="empty-state"><div className="empty-icon">💼</div><div className="empty-text">No jobs yet</div></div> : (
        <div className="jobs-grid">
          {jobs.map(j => (
            <div key={j.id} className="job-card">
              <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start' }}>
                <div>
                  <div className="job-card-title">{j.title}</div>
                  <div className="job-card-dept">{j.department || '—'}</div>
                </div>
                <span className={`badge badge-${j.status}`}>{j.status}</span>
              </div>
              <div style={{ marginBottom: 14 }}>
                {(j.requiredSkills||'').split(',').slice(0,4).map(s => s.trim()).filter(Boolean).map(s =>
                  <span key={s} className="tag">{s}</span>
                )}
              </div>
              <div className="job-card-meta">
                <span>🎓 {j.educationLevel}</span>
                <span>⏱ {j.minExperience}+ yrs</span>
                <span>🎯 {j.shortlistThreshold}% threshold</span>
              </div>
              <div style={{ display:'flex', gap:8, marginTop:16 }}>
                <button className="btn btn-outline btn-sm" onClick={() => onSelectJob(j)}>View Candidates</button>
                <button className="btn btn-outline btn-sm" onClick={() => openEdit(j)}>Edit</button>
                <button className="btn btn-sm" style={{background:'transparent',color:'var(--muted)',border:'none'}} onClick={() => del(j)}>✕</button>
              </div>
            </div>
          ))}
        </div>
      )}

      {showModal && (
        <div className="modal-overlay" onClick={e => e.target===e.currentTarget && setShowModal(false)}>
          <div className="modal-box">
            <div className="modal-title">{editJob ? 'Edit Job' : 'Create Job'}</div>
            <div className="form-grid">
              {[
                { label:'Job Title', key:'title', full:true },
                { label:'Department', key:'department' },
                { label:'Min Experience (years)', key:'minExperience', type:'number' },
              ].map(f => (
                <div key={f.key} className={`form-field ${f.full ? 'full' : ''}`}>
                  <label className="form-label">{f.label}</label>
                  <input className="form-input" type={f.type||'text'} value={form[f.key]}
                         onChange={e => setForm(p => ({...p, [f.key]: e.target.value}))} />
                </div>
              ))}
              <div className="form-field">
                <label className="form-label">Education Level</label>
                <select className="form-input" value={form.educationLevel}
                        onChange={e => setForm(p => ({...p, educationLevel: e.target.value}))}>
                  {['DIPLOMA','BACHELORS','MASTERS','PHD'].map(v => <option key={v}>{v}</option>)}
                </select>
              </div>
              <div className="form-field">
                <label className="form-label">Status</label>
                <select className="form-input" value={form.status}
                        onChange={e => setForm(p => ({...p, status: e.target.value}))}>
                  {['OPEN','CLOSED','DRAFT'].map(v => <option key={v}>{v}</option>)}
                </select>
              </div>
              <div className="form-field full">
                <label className="form-label">Required Skills (comma-separated)</label>
                <input className="form-input" value={form.requiredSkills}
                       onChange={e => setForm(p => ({...p, requiredSkills: e.target.value}))} />
              </div>
              <div className="form-field full">
                <label className="form-label">Preferred Skills</label>
                <input className="form-input" value={form.preferredSkills}
                       onChange={e => setForm(p => ({...p, preferredSkills: e.target.value}))} />
              </div>
              <div className="form-field full">
                <label className="form-label">Keywords (for keyword scoring)</label>
                <input className="form-input" value={form.keywords}
                       onChange={e => setForm(p => ({...p, keywords: e.target.value}))} />
              </div>
              <div className="form-field">
                <label className="form-label">Shortlist Threshold (%)</label>
                <input className="form-input" type="number" min="0" max="100" value={form.shortlistThreshold}
                       onChange={e => setForm(p => ({...p, shortlistThreshold: +e.target.value}))} />
              </div>
              <div className="form-field full">
                <label className="form-label">Job Description</label>
                <textarea className="form-input" value={form.description}
                          onChange={e => setForm(p => ({...p, description: e.target.value}))} />
              </div>
            </div>
            <div className="modal-actions">
              <button className="btn btn-outline" onClick={() => setShowModal(false)}>Cancel</button>
              <button className="btn btn-dark" onClick={save}>Save Job</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── Upload ─────────────────────────────────────────────────────────────────────
function Upload() {
  const [jobs, setJobs] = useState([]);
  const [selectedJob, setSelectedJob] = useState('');
  const [files, setFiles] = useState([]);
  const [dragging, setDragging] = useState(false);
  const [uploading, setUploading] = useState(false);
  const [results, setResults] = useState([]);
  const inputRef = useRef();

  useEffect(() => {
    api.get('/jobs').then(data => { setJobs(data); if(data[0]) setSelectedJob(String(data[0].id)); }).catch(()=>{});
  }, []);

  const addFiles = f => setFiles(p => {
    const existing = new Set(p.map(x => x.name));
    return [...p, ...[...f].filter(x => !existing.has(x.name) && (x.name.endsWith('.pdf')||x.name.endsWith('.docx')))];
  });

  const onDrop = e => {
    e.preventDefault(); setDragging(false);
    addFiles(e.dataTransfer.files);
  };

  const upload = async () => {
    if (!files.length || !selectedJob) return;
    setUploading(true); setResults([]);
    try {
      if (files.length === 1) {
        const fd = new FormData();
        fd.append('file', files[0]);
        fd.append('jobId', selectedJob);
        const r = await api.upload('/resumes/upload', fd);
        setResults([r]);
      } else {
        const fd = new FormData();
        files.forEach(f => fd.append('files', f));
        fd.append('jobId', selectedJob);
        const r = await api.upload('/resumes/upload/bulk', fd);
        setResults(Array.isArray(r) ? r : [r]);
      }
      toast(`Screened ${files.length} resume(s) successfully`);
      setFiles([]);
    } catch(e) {
      toast('Upload failed: ' + e.message, 'error');
    } finally {
      setUploading(false);
    }
  };

  const fmt = b => b < 1024 ? b+'B' : b < 1048576 ? Math.round(b/1024)+'KB' : (b/1048576).toFixed(1)+'MB';

  return (
    <div>
      <div className="page-header">
        <div>
          <div className="page-title">Upload Resumes</div>
          <div className="page-sub">PDF and DOCX supported · up to 50 at once</div>
        </div>
      </div>

      <div className="card" style={{ marginBottom: 24 }}>
        <div className="form-field" style={{ marginBottom: 20 }}>
          <label className="form-label">Select Job Position</label>
          <select className="form-input" value={selectedJob} onChange={e => setSelectedJob(e.target.value)}
                  style={{ maxWidth: 360 }}>
            <option value="">— Choose a job —</option>
            {jobs.map(j => <option key={j.id} value={j.id}>{j.title}</option>)}
          </select>
        </div>

        <div className={`upload-zone ${dragging ? 'dragging' : ''}`}
             onDragOver={e => { e.preventDefault(); setDragging(true); }}
             onDragLeave={() => setDragging(false)}
             onDrop={onDrop}
             onClick={() => inputRef.current.click()}>
          <div className="upload-icon">📄</div>
          <div className="upload-label">Drop resumes here</div>
          <div className="upload-sub">or click to browse · PDF, DOCX · max 20MB each</div>
          <input ref={inputRef} type="file" multiple accept=".pdf,.docx" className="upload-input"
                 onChange={e => addFiles(e.target.files)} />
        </div>

        {files.length > 0 && (
          <div className="file-list">
            {files.map((f,i) => (
              <div key={i} className="file-item">
                <span>{f.name.endsWith('.pdf') ? '📕' : '📘'}</span>
                <span className="file-name">{f.name}</span>
                <span className="file-size">{fmt(f.size)}</span>
                <button className="btn btn-outline btn-sm" onClick={() => setFiles(p => p.filter((_,j)=>j!==i))}>✕</button>
              </div>
            ))}
          </div>
        )}

        {files.length > 0 && (
          <div style={{ marginTop: 20, display:'flex', gap: 12, alignItems: 'center' }}>
            <button className="btn btn-dark" onClick={upload} disabled={uploading || !selectedJob}>
              {uploading ? <><span className="spinner" style={{marginRight:8}} /> Screening…</> : `Screen ${files.length} Resume${files.length>1?'s':''}`}
            </button>
            <button className="btn btn-outline" onClick={() => setFiles([])}>Clear All</button>
          </div>
        )}
      </div>

      {results.length > 0 && (
        <div className="card">
          <div className="section-title" style={{ marginBottom: 16 }}>Screening Results</div>
          <div className="table-wrap">
            <table>
              <thead><tr>
                <th>Candidate</th><th>Overall</th><th>Skills</th><th>Experience</th><th>Education</th><th>Status</th>
              </tr></thead>
              <tbody>
                {results.map((r,i) => (
                  <tr key={i}>
                    <td><strong>{r.candidateName||'Unknown'}</strong><br /><small style={{color:'var(--muted)'}}>{r.candidateEmail}</small></td>
                    <td><ScoreBar value={r.overallScore} /></td>
                    <td><ScoreBar value={r.skillsScore} /></td>
                    <td><ScoreBar value={r.experienceScore} /></td>
                    <td><ScoreBar value={r.educationScore} /></td>
                    <td><span className={`badge badge-${r.status}`}>{r.status}</span></td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      )}
    </div>
  );
}

// ── Candidates ─────────────────────────────────────────────────────────────────
function Candidates({ initialJob }) {
  const [jobs, setJobs] = useState([]);
  const [selectedJob, setSelectedJob] = useState(initialJob ? String(initialJob.id) : '');
  const [results, setResults] = useState([]);
  const [loading, setLoading] = useState(false);
  const [selected, setSelected] = useState(null);
  const [filterStatus, setFilterStatus] = useState('ALL');

  useEffect(() => {
    api.get('/jobs').then(d => {
      setJobs(d);
      if (!selectedJob && d[0]) setSelectedJob(String(d[0].id));
    }).catch(()=>{});
  }, []);

  useEffect(() => {
    if (initialJob) setSelectedJob(String(initialJob.id));
  }, [initialJob]);

  useEffect(() => {
    if (!selectedJob) return;
    setLoading(true);
    api.get(`/resumes/job/${selectedJob}/results`)
       .then(d => { setResults(d); setLoading(false); })
       .catch(() => setLoading(false));
  }, [selectedJob]);

  const updateStatus = async (id, status) => {
    try {
      const updated = await api.patch(`/resumes/result/${id}/status`, { status });
      setResults(p => p.map(r => r.id===id ? updated : r));
      if (selected?.id === id) setSelected(updated);
      toast('Status updated');
    } catch(e) { toast(e.message, 'error'); }
  };

  const filtered = filterStatus === 'ALL' ? results : results.filter(r => r.status === filterStatus);

  return (
    <div>
      <div className="page-header">
        <div>
          <div className="page-title">Candidates</div>
          <div className="page-sub">{results.length} screened · {results.filter(r=>r.status==='SHORTLISTED').length} shortlisted</div>
        </div>
        <div style={{ display:'flex', gap:10 }}>
          <select className="select-sm" value={selectedJob} onChange={e => setSelectedJob(e.target.value)}>
            <option value="">All Jobs</option>
            {jobs.map(j => <option key={j.id} value={j.id}>{j.title}</option>)}
          </select>
          <select className="select-sm" value={filterStatus} onChange={e => setFilterStatus(e.target.value)}>
            <option value="ALL">All Statuses</option>
            {['SCREENED','SHORTLISTED','INTERVIEWED','OFFERED','HIRED','REJECTED'].map(s =>
              <option key={s}>{s}</option>
            )}
          </select>
        </div>
      </div>

      <div className="card">
        {loading ? <div className="loading-overlay"><span className="spinner" /></div> :
         filtered.length === 0 ? <div className="empty-state"><div className="empty-icon">👤</div><div className="empty-text">No candidates found</div></div> : (
          <div className="table-wrap">
            <table>
              <thead><tr>
                <th>Candidate</th><th>Overall</th><th>Skills</th><th>Exp.</th><th>Edu.</th><th>Years</th><th>Status</th><th>Actions</th>
              </tr></thead>
              <tbody>
                {filtered.map(r => (
                  <tr key={r.id} style={{ cursor:'pointer' }} onClick={() => setSelected(r)}>
                    <td>
                      <strong>{r.candidateName || 'Unknown'}</strong><br />
                      <small style={{color:'var(--muted)',fontSize:11}}>{r.candidateEmail}</small>
                    </td>
                    <td><ScoreBar value={r.overallScore} /></td>
                    <td><ScoreBar value={r.skillsScore} /></td>
                    <td><ScoreBar value={r.experienceScore} /></td>
                    <td><ScoreBar value={r.educationScore} /></td>
                    <td style={{fontFamily:'DM Mono,monospace',fontSize:12}}>{r.yearsExperience||0}y</td>
                    <td><span className={`badge badge-${r.status}`}>{r.status}</span></td>
                    <td onClick={e => e.stopPropagation()}>
                      <select className="select-sm" value={r.status}
                              onChange={e => updateStatus(r.id, e.target.value)}>
                        {['SCREENED','SHORTLISTED','INTERVIEWED','OFFERED','HIRED','REJECTED'].map(s =>
                          <option key={s}>{s}</option>
                        )}
                      </select>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        )}
      </div>

      {/* Detail Panel */}
      <div className={`detail-panel ${selected ? 'open' : ''}`}>
        {selected && <>
          <span className="detail-close" onClick={() => setSelected(null)}>✕</span>
          <div style={{ marginTop: 8, fontSize: 11, textTransform:'uppercase', letterSpacing:'.08em', color:'var(--muted)' }}>Candidate Profile</div>
          <div className="detail-name">{selected.candidateName || 'Unknown'}</div>
          <div className="detail-email">{selected.candidateEmail || '—'} · {selected.candidatePhone || ''}</div>
          <span className={`badge badge-${selected.status}`} style={{marginBottom:20,display:'inline-block'}}>{selected.status}</span>

          <div className="score-ring-row">
            {[
              { label:'Overall', val: selected.overallScore },
              { label:'Skills',  val: selected.skillsScore },
              { label:'Exp.',    val: selected.experienceScore },
              { label:'Edu.',    val: selected.educationScore },
            ].map(s => (
              <div key={s.label} className="score-ring">
                <div className="score-ring-val" style={{ color: s.val>=70?'var(--success)':s.val>=50?'var(--warn)':'var(--accent)' }}>
                  {Math.round(s.val||0)}
                </div>
                <div className="score-ring-lbl">{s.label}</div>
              </div>
            ))}
          </div>

          <div className="detail-section">
            <div className="detail-section-title">Details</div>
            <div style={{fontSize:13,lineHeight:2}}>
              <span style={{color:'var(--muted)'}}>Experience: </span>{selected.yearsExperience||0} years<br/>
              <span style={{color:'var(--muted)'}}>Education: </span>{selected.educationLevel||'—'}<br/>
              {selected.candidateLinkedin && <><span style={{color:'var(--muted)'}}>LinkedIn: </span>{selected.candidateLinkedin}<br/></>}
            </div>
          </div>

          {selected.matchedSkills && (() => {
            let skills = [];
            try { skills = JSON.parse(selected.matchedSkills); } catch{}
            return skills.length ? (
              <div className="detail-section">
                <div className="detail-section-title">Matched Skills</div>
                {skills.map(s => <span key={s} className="skill-tag">{s}</span>)}
              </div>
            ) : null;
          })()}

          {selected.aiSummary && (
            <div className="detail-section">
              <div className="detail-section-title">AI Summary</div>
              <p className="summary-text">{selected.aiSummary}</p>
            </div>
          )}

          <div style={{ marginTop: 24 }}>
            <div className="form-label" style={{ marginBottom: 8 }}>Update Status</div>
            <select className="form-input" value={selected.status}
                    onChange={e => updateStatus(selected.id, e.target.value)}>
              {['SCREENED','SHORTLISTED','INTERVIEWED','OFFERED','HIRED','REJECTED'].map(s =>
                <option key={s}>{s}</option>
              )}
            </select>
          </div>
        </>}
      </div>
    </div>
  );
}

// ── App ───────────────────────────────────────────────────────────────────────
function App() {
  const [auth, setAuth] = useState(() => {
    const t = localStorage.getItem('jwt_token');
    const u = localStorage.getItem('jwt_user');
    if (t && u) { api.setToken(t); return JSON.parse(u); }
    return null;
  });
  const [page, setPage] = useState('dashboard');
  const [jobForCandidates, setJobForCandidates] = useState(null);

  const login = (data) => {
    api.setToken(data.token);
    localStorage.setItem('jwt_token', data.token);
    localStorage.setItem('jwt_user', JSON.stringify(data));
    setAuth(data);
  };

  const logout = () => {
    api.setToken(null);
    localStorage.removeItem('jwt_token');
    localStorage.removeItem('jwt_user');
    setAuth(null);
  };

  const goToCandidates = (job) => {
    setJobForCandidates(job);
    setPage('candidates');
  };

  if (!auth) return <AuthPage onLogin={login} />;

  const navItems = [
    { id:'dashboard',  icon:'◈', label:'Dashboard' },
    { id:'jobs',       icon:'◉', label:'Jobs' },
    { id:'upload',     icon:'↑', label:'Upload Resumes' },
    { id:'candidates', icon:'◎', label:'Candidates' },
  ];

  const initials = (name) => name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);

  return (
    <div className="app-shell">
      <nav className="sidebar">
        <div className="sidebar-logo">Resume<span>AI</span></div>
        <div className="sidebar-nav">
          {navItems.map(n => (
            <div key={n.id} className={`nav-item ${page===n.id?'active':''}`}
                 onClick={() => setPage(n.id)}>
              <span className="nav-icon">{n.icon}</span>
              {n.label}
            </div>
          ))}
        </div>
        <div className="sidebar-user">
          <div className="user-avatar">{initials(auth.fullName||auth.email)}</div>
          <div className="user-info">
            <div className="user-name">{auth.fullName}</div>
            <div className="user-role">{auth.role}</div>
          </div>
          <span className="logout-btn" onClick={logout} title="Sign out">⏻</span>
        </div>
      </nav>

      <main className="main-content">
        {page === 'dashboard'  && <Dashboard />}
        {page === 'jobs'       && <Jobs onSelectJob={goToCandidates} />}
        {page === 'upload'     && <Upload />}
        {page === 'candidates' && <Candidates initialJob={jobForCandidates} />}
      </main>
      <Toast />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
